name: CI

# Run tests on every push and PR. Render handles deploys separately
# via its native GitHub integration (auto-deploy on push to main).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install OpenMP (needed by XGBoost on Ubuntu)
        run: sudo apt-get update && sudo apt-get install -y libomp-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Verify model artifacts are committed
        run: |
          test -f model/model.pkl
          test -f model/preprocessor.pkl
          test -f model/model_metadata.json
          test -f data/processed/raw_train.csv

      - name: Run tests
        run: pytest -q
